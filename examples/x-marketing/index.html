<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Marketing — Hanzi</title>
  <style>
    :root {
      --bg: #f7f3ea; --surface: #fffdf8; --ink: #1f1711; --muted: #6d6256;
      --line: #e5ddd0; --accent: #ad5a34; --accent-hover: #8d4524;
      --green: #2f4a3d; --green-bg: #eef5f0; --blue: #1d6fa5; --blue-bg: #eef3f8;
      --red: #9a2e2e; --red-bg: #fef0ef;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }

    /* Shell */
    .shell { max-width: 560px; margin: 0 auto; padding: 24px 16px 100px; }

    /* Header */
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .brand svg { width: 32px; height: 32px; }
    .brand span { font-size: 15px; font-weight: 700; color: var(--ink); }

    /* Typography */
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 28px; }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .field .hint { color: var(--muted); font-weight: 400; }
    .field input, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 15px; color: var(--ink); background: var(--surface); outline: none; font-family: inherit; resize: none; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: #b8ad9e; }

    /* Buttons */
    .btn { border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; width: auto; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-approve:hover { opacity: 0.9; }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--line); }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    /* Progress stepper */
    .stepper { margin: 32px 0; }
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; position: relative; }
    .step-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 700; color: var(--muted); transition: all 0.3s; }
    .step.active .step-dot { border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
    .step.done .step-dot { border-color: var(--green); background: var(--green); color: #fff; }
    .step-label { font-size: 14px; color: var(--muted); padding-top: 2px; }
    .step.active .step-label { color: var(--ink); font-weight: 600; }
    .step.done .step-label { color: var(--green); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Draft card */
    .draft-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .draft-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .draft-author { display: flex; gap: 10px; align-items: center; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--line); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--muted); flex-shrink: 0; }
    .author-name { font-weight: 600; font-size: 14px; }
    .author-handle { color: var(--muted); font-size: 13px; }
    .author-followers { color: var(--muted); font-size: 12px; }

    /* Tweet + reply */
    .original-tweet { background: var(--bg); padding: 10px 12px; border-radius: 10px; font-size: 14px; line-height: 1.5; color: var(--ink); margin-bottom: 10px; }
    .draft-reply { background: var(--green-bg); border-left: 3px solid var(--green); padding: 10px 12px; border-radius: 0 10px 10px 0; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
    .draft-meta { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
    .draft-actions { display: flex; gap: 8px; }

    /* Type badges */
    .type-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .type-helpful { background: var(--green-bg); color: var(--green); }
    .type-mention { background: var(--blue-bg); color: var(--blue); }
    .type-direct { background: #fef5ee; color: #8a5a2e; }

    /* Keyword chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { background: var(--surface); border: 1px solid var(--line); padding: 4px 10px; border-radius: 16px; font-size: 13px; color: var(--ink); }

    /* Strategy summary */
    .strategy-bar { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .strategy-bar-info { font-size: 13px; color: var(--muted); }
    .strategy-bar-info strong { color: var(--ink); }

    /* Post bar */
    .post-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--line); padding: 12px; z-index: 10; }
    .post-bar-inner { max-width: 560px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .post-bar-info { font-size: 14px; color: var(--muted); }
    .post-bar-info strong { color: var(--ink); }

    /* Empty state */
    .empty { text-align: center; padding: 48px 0; }
    .empty p { color: var(--muted); font-size: 14px; margin-top: 8px; }

    /* Toast */
    .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--surface); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* Edit */
    .edit-area { width: 100%; border: 1px solid var(--accent); border-radius: 8px; padding: 8px; font-size: 14px; color: var(--ink); background: var(--surface); resize: none; outline: none; font-family: inherit; margin-top: 6px; }

    /* Section divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    /* Posted item */
    .posted-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .posted-item a { color: var(--accent); text-decoration: none; }
    .posted-time { color: var(--muted); font-size: 12px; }

    /* Pairing */
    .pair-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 24px; text-align: center; margin: 24px 0; }
    .pair-card h3 { font-size: 18px; margin-bottom: 8px; }
    .pair-card p { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  </style>
</head>
<body>
<script src="https://api.hanzilla.co/embed.js"></script>
<div class="shell">
  <!-- Brand -->
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#1a1a1a"/><path d="M7 7v10M17 7v10M7 12h10" stroke="#fafaf8" stroke-width="2.5" stroke-linecap="round"/></svg>
    <span>X Marketing</span>
  </div>

  <div id="app"></div>

  <!-- Powered by -->
  <div style="text-align:center;padding:24px 0 8px;font-size:12px;color:var(--muted)">
    Powered by <a href="https://browse.hanzilla.co" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600">Hanzi Browse</a> — give your AI agent a real browser
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sid = null;
let product = null;
let allDrafts = [];
let screen = 'setup'; // setup | working | feed | posted

const $ = s => document.getElementById(s);
const api = async (m, p, b) => {
  try {
    const r = await fetch(p, { method: m, headers: {'Content-Type':'application/json'}, body: b ? JSON.stringify(b) : undefined });
    return r.json();
  } catch (e) {
    console.error('API error:', m, p, e.message);
    return null;
  }
};

function toast(m) {
  const t = $('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

const typeLabels = { A: 'Helpful reply', B: 'Soft mention', C: 'Direct pitch' };
const typeClasses = { A: 'type-helpful', B: 'type-mention', C: 'type-direct' };

// ── Init ──
// ── Local storage ──
function save() {
  localStorage.setItem('xm_product', JSON.stringify(product));
  localStorage.setItem('xm_drafts', JSON.stringify(allDrafts));
}
function load() {
  try { product = JSON.parse(localStorage.getItem('xm_product')); } catch {}
  try { allDrafts = JSON.parse(localStorage.getItem('xm_drafts')) || []; } catch {}
}

async function init() {
  load();
  if (product && product.name) {
    screen = allDrafts.length > 0 ? 'feed' : 'strategy';
  }
  try {
    const s = await api('GET', '/api/sessions');
    if (s) {
      const c = (s.sessions || []).find(x => x.status === 'connected');
      if (c) sid = c.id;
    }
  } catch {}
  render();
}

// ── Render ──
function render() {
  if (screen === 'setup') renderSetup();
  else if (screen === 'strategy') renderStrategy();
  else if (screen === 'working') {} // controlled by flow functions
  else if (screen === 'posted') renderPosted();
  else renderFeed();
}

function renderSetup() {
  $('app').innerHTML = `
    <h1>Find people talking about your product on X</h1>
    <p class="subtitle">We use AI to find relevant conversations, then open your real Chrome to search X and draft personalized replies. You approve before anything gets posted.</p>

    <div class="field">
      <label>Product name</label>
      <input id="f-name" placeholder="Hanzi Browse" value="${product?.name || ''}" />
    </div>
    <div class="field">
      <label>Website <span class="hint">(optional — we'll read it for better results)</span></label>
      <input id="f-url" placeholder="https://browse.hanzilla.co" value="${product?.url || ''}" />
    </div>
    <div class="field">
      <label>What does it do?</label>
      <textarea id="f-desc" rows="2" placeholder="Give your AI agent a real browser">${product?.description || ''}</textarea>
    </div>

    <button class="btn btn-primary" onclick="startFlow()">Find my audience</button>
  `;
}

// ── Phase 1: Analyze product (no browser needed) ──
async function startFlow() {
  const name = $('f-name').value.trim();
  const url = $('f-url').value.trim();
  const desc = $('f-desc').value.trim();
  if (!name) return toast('Enter a product name');

  screen = 'working';
  const steps = [
    { label: 'Analyzing your product', done: false, active: true },
    ...(url ? [{ label: 'Reading your website', done: false, active: false }] : []),
  ];

  function renderAnalyzeSteps() {
    $('app').innerHTML = `
      <h1>Understanding your product...</h1>
      <p class="subtitle">We're analyzing your product to find the right audience.</p>
      <div class="stepper">
        ${steps.map((s, i) => `
          <div class="step ${s.done ? 'done' : s.active ? 'active' : ''}">
            <div class="step-dot">${s.done ? '\u2713' : i + 1}</div>
            <div class="step-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  renderAnalyzeSteps();

  try {
    // Step 1: Analyze from description
    const analyzeResult = await api('POST', '/api/analyze', { name, url, description: desc });
    if (!analyzeResult || analyzeResult.error) throw new Error(analyzeResult?.error || 'Analysis failed');
    product = analyzeResult;
    steps[0].done = true;

    // Step 2: Read website if URL provided
    if (url) {
      steps[1].active = true;
      renderAnalyzeSteps();

      const browserSid = await ensureBrowser(() => {});
      if (browserSid) {
        try {
          const readResult = await api('POST', '/api/read-url', { browser_session_id: browserSid, url });
          if (readResult?.content) {
            const betterResult = await api('POST', '/api/analyze', { name, url, description: desc, page_content: readResult.content });
            if (betterResult && !betterResult.error) product = betterResult;
          }
        } catch (e) { console.log('URL read failed, using basic analysis'); }
      }
      steps[1].done = true;
    }

    // Show strategy review screen
    save();
    screen = 'strategy';
    renderStrategy();
  } catch (err) {
    const msg = err.message || 'Unknown error';
    $('app').innerHTML = `
      <div class="draft-card" style="border-color:var(--red);background:var(--red-bg)">
        <h3 style="color:var(--red);margin-bottom:8px">Analysis failed</h3>
        <p style="font-size:14px;color:var(--ink);margin-bottom:12px">${msg}</p>
        ${msg.includes('exhausted') || msg.includes('credits') ? '<p style="font-size:13px;color:var(--muted)">Reading your website uses 1 task credit. <a href="https://api.hanzilla.co/dashboard" target="_blank" style="color:var(--accent)">Add credits \u2192</a></p>' : ''}
      </div>
      <button class="btn btn-primary" onclick="screen='setup';render()" style="margin-top:12px">Try again</button>
    `;
  }
}

// ── Strategy review (between Phase 1 and 2) ──
function renderStrategy() {
  const p = product;
  $('app').innerHTML = `
    <h1>Here's your strategy</h1>
    <p class="subtitle">Review and edit keywords, then search X.</p>

    <div class="draft-card">
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Keywords to search <span style="font-weight:400">(click to remove, type to add)</span></div>
        <div class="chips" id="keyword-chips">
          ${(p.keywords || []).map((k, i) => `<span class="chip" style="cursor:pointer" onclick="removeKeyword(${i})">${k} <span style="margin-left:4px;opacity:0.5">\u00d7</span></span>`).join('')}
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <input id="new-keyword" placeholder="Add keyword..." style="flex:1;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--surface);color:var(--ink);outline:none" onkeydown="if(event.key==='Enter'){addKeyword()}" />
          <button class="btn btn-ghost btn-sm" onclick="addKeyword()">Add</button>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Target audience</div>
        <div style="font-size:14px">${p.audience || ''}</div>
      </div>
      <div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">One-liner for replies</div>
        <div style="font-size:14px">${p.product_pitch || ''}</div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startSearch()" style="margin-top:8px">Search X for conversations</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" onclick="screen='setup';render()" style="flex:1">Edit product</button>
      <button class="btn btn-ghost" onclick="product=null;allDrafts=[];localStorage.clear();screen='setup';render()" style="flex:1;font-size:13px;color:var(--muted)">Start over</button>
    </div>
  `;
}

function removeKeyword(idx) {
  product.keywords.splice(idx, 1);
  save();
  renderStrategy();
}

function addKeyword() {
  const input = $('new-keyword');
  const val = input.value.trim();
  if (!val || product.keywords.includes(val)) return;
  product.keywords.push(val);
  save();
  renderStrategy();
}

// ── Phase 2: Search X + draft replies (needs browser) ──
async function startSearch() {
  screen = 'working';
  const steps = [
    { label: 'Searching X for conversations', done: false, active: true },
    { label: 'Drafting replies', done: false, active: false },
  ];

  let searchTaskId = null;

  function renderSearchSteps() {
    $('app').innerHTML = `
      <h1>Searching X...</h1>
      <p class="subtitle">Hanzi Browse is searching X from your real Chrome. This takes 2\u20134 minutes.</p>
      <div class="stepper">
        ${steps.map((s, i) => `
          <div class="step ${s.done ? 'done' : s.active ? 'active' : ''}">
            <div class="step-dot">${s.done ? '\u2713' : i + 1}</div>
            <div class="step-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:24px;padding:12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px">
        <svg viewBox="0 0 24 24" fill="none" style="width:16px;height:16px;flex-shrink:0"><rect width="24" height="24" rx="6" fill="#1a1a1a"/><path d="M7 7v10M17 7v10M7 12h10" stroke="#fafaf8" stroke-width="2.5" stroke-linecap="round"/></svg>
        Your browser is being controlled by <a href="https://browse.hanzilla.co" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600">Hanzi Browse SDK</a>
      </div>
      ${searchTaskId ? `<div style="margin-top:8px;font-size:11px;color:var(--muted);font-family:monospace">Task: ${searchTaskId}</div>` : ''}
    `;
  }

  renderSearchSteps();

  try {
    const browserSid = sid || await ensureBrowser(() => {});
    if (!browserSid) throw new Error('Browser connection needed to search X');

    // Step 1: Search
    const searchResult = await api('POST', '/api/search', { browser_session_id: browserSid, keywords: product.keywords });
    if (!searchResult || searchResult.error) throw new Error(searchResult?.error || 'Search failed');
    if (searchResult.task_id) { searchTaskId = searchResult.task_id; renderSearchSteps(); }
    if (!searchResult.tweets?.length) throw new Error('No tweets found (task: ' + (searchResult.task_id || 'unknown') + '). The agent browsed X but didn\u2019t return data. Try again.');
    steps[0].done = true;
    steps[1].active = true;
    renderSearchSteps();

    // Step 2: Draft replies
    const draftResult = await api('POST', '/api/draft', { tweets: searchResult.tweets });
    if (!draftResult || draftResult.error) throw new Error(draftResult?.error || 'Drafting failed');
    allDrafts = draftResult.drafts || [];
    steps[1].done = true;

    save();
    toast(allDrafts.length + ' draft replies ready!');
    screen = 'feed';
    render();
  } catch (err) {
    const msg = err.message || 'Unknown error';
    // Show error inline instead of silently going back
    $('app').innerHTML = `
      <div class="draft-card" style="border-color:var(--red);background:var(--red-bg)">
        <h3 style="color:var(--red);margin-bottom:8px">Search failed</h3>
        <p style="font-size:14px;color:var(--ink);margin-bottom:12px">${msg}</p>
        ${msg.includes('exhausted') || msg.includes('credits') ? '<p style="font-size:13px;color:var(--muted)">Each keyword search uses 1 task credit. <a href="https://api.hanzilla.co/dashboard" target="_blank" style="color:var(--accent)">Add credits \u2192</a></p>' : ''}
        ${msg.includes('Browser') || msg.includes('connected') ? '<p style="font-size:13px;color:var(--muted)">Make sure the Hanzi Browse extension is running in Chrome.</p>' : ''}
        ${searchTaskId ? `<p style="font-size:11px;color:var(--muted);font-family:monospace;margin-top:8px">Task ID: ${searchTaskId}</p>` : ''}
      </div>
      <button class="btn btn-primary" onclick="startSearch()" style="margin-top:12px">Try again</button>
      <button class="btn btn-ghost" onclick="screen='strategy';renderStrategy()" style="margin-top:8px;width:100%">Edit keywords</button>
    `;
  }
}

async function ensureBrowser() {
  if (sid) return sid;

  return new Promise(resolve => {
    // Use Hanzi Browse embeddable component if available
    if (typeof HanziConnect !== 'undefined') {
      $('app').innerHTML = '<div id="hanzi-pair-widget" style="max-width:400px;margin:24px auto"></div>';
      HanziConnect.mount('#hanzi-pair-widget', {
        apiKey: 'hic_live_proxy', // Widget calls our server which proxies
        apiUrl: '',               // Relative URLs — our server handles /v1/*
        purpose: 'search X and post replies on your behalf',
        onConnected: (sessionId) => {
          sid = sessionId;
          toast('Browser connected!');
          resolve(sid);
        },
      });
    } else {
      // Fallback: simple inline pairing
      $('app').innerHTML = `
        <div class="draft-card" style="text-align:center;max-width:400px;margin:24px auto">
          <h3 style="margin-bottom:8px">Connect your browser</h3>
          <p style="color:var(--muted);font-size:14px;margin-bottom:16px">We need your Chrome to search X.</p>
          <button class="btn btn-primary" style="width:auto" id="pair-fallback">Connect browser</button>
          <div id="pair-status" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>
        </div>`;
      $('pair-fallback').onclick = async () => {
        $('pair-status').textContent = 'Opening pairing link...';
        const d = await api('POST', '/api/pair');
        if (!d?.pairing_url) { $('pair-status').textContent = 'Failed.'; resolve(null); return; }
        window.open(d.pairing_url, '_blank');
        $('pair-status').textContent = 'Complete pairing in the new tab...';
        for (let i = 0; i < 30; i++) {
          await new Promise(r => setTimeout(r, 2000));
          if (await checkBrowser()) { toast('Connected!'); resolve(sid); return; }
        }
        $('pair-status').textContent = 'Timed out. Try again.';
        resolve(null);
      };
    }
  });
}

// ── Feed ──
function renderFeed() {
  const pending = allDrafts.filter(d => d.status === 'pending' || d.status === 'approved');
  const approvedN = allDrafts.filter(d => d.status === 'approved').length;

  if (pending.length === 0 && allDrafts.length === 0) {
    $('app').innerHTML = `
      <div class="empty">
        <h1>Ready to scout</h1>
        <p>Search X for conversations about ${product?.name || 'your product'}.</p>
        <button class="btn btn-primary" style="margin-top:20px;max-width:240px;margin-left:auto;margin-right:auto" onclick="startFlow()">Find conversations</button>
      </div>`;
    return;
  }

  if (pending.length === 0) {
    $('app').innerHTML = `
      <div class="empty">
        <h1>All done!</h1>
        <p>No more drafts to review.</p>
        <button class="btn btn-primary" style="margin-top:20px;max-width:240px;margin-left:auto;margin-right:auto" onclick="startFlow()">Find more</button>
        <br><button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="screen='posted';render()">View posted</button>
      </div>`;
    return;
  }

  let html = `
    <div class="strategy-bar">
      <div class="strategy-bar-info">
        <strong>${product?.name}</strong> \u00b7 ${pending.length} draft${pending.length === 1 ? '' : 's'}
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="screen='posted';render()">Posted</button>
        <button class="btn btn-ghost btn-sm" onclick="screen='setup';render()">Edit</button>
      </div>
    </div>
  `;

  html += pending.map(d => {
    const initials = (d.author_name || '?')[0].toUpperCase();
    const typeLabel = typeLabels[d.reply_type] || d.reply_type || '?';
    const typeClass = typeClasses[d.reply_type] || 'type-helpful';
    const isApproved = d.status === 'approved';

    return `
    <div class="draft-card" id="d-${d.id}">
      <div class="draft-header">
        <div class="draft-author">
          <div class="avatar">${initials}</div>
          <div>
            <div class="author-name">${d.author_name || 'Unknown'} <span class="author-handle">${d.author_handle || ''}</span></div>
            <div class="author-followers">${d.author_followers ? d.author_followers.toLocaleString() + ' followers' : ''}</div>
          </div>
        </div>
        <span class="type-tag ${typeClass}">${typeLabel}</span>
      </div>
      <div class="original-tweet">${d.tweet_text || ''}</div>
      <div class="draft-reply" id="reply-${d.id}">${d.reply_text}</div>
      ${d.reasoning ? '<div class="draft-meta">' + d.reasoning + '</div>' : ''}
      <div class="draft-actions">
        ${isApproved
          ? '<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);cursor:default">Approved</button>'
          : `<button class="btn btn-approve btn-sm" onclick="approve('${d.id}')">Approve</button>` +
            `<button class="btn btn-ghost btn-sm" onclick="editDraft('${d.id}')">Edit</button>` +
            `<button class="btn btn-ghost btn-sm" onclick="skip('${d.id}')">Skip</button>`
        }
      </div>
    </div>`;
  }).join('');

  $('app').innerHTML = html;

  // Post bar
  const existing = document.querySelector('.post-bar');
  if (existing) existing.remove();
  if (approvedN > 0) {
    const bar = document.createElement('div');
    bar.className = 'post-bar';
    bar.innerHTML = `<div class="post-bar-inner"><div class="post-bar-info"><strong>${approvedN}</strong> approved</div><button class="btn btn-approve btn-sm" id="post-all" onclick="postAll()">Post all</button></div>`;
    document.body.appendChild(bar);
  }
}

async function renderPosted() {
  const data = await api('GET', '/api/posted');
  const existing = document.querySelector('.post-bar');
  if (existing) existing.remove();

  if (!data.length) {
    $('app').innerHTML = `
      <div class="empty">
        <h1>No posts yet</h1>
        <p>Approve some drafts and post them.</p>
        <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="screen='feed';render()">Back to drafts</button>
      </div>`;
    return;
  }

  $('app').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1 style="font-size:20px">Posted</h1>
      <button class="btn btn-ghost btn-sm" onclick="screen='feed';render()">Back</button>
    </div>
    ${data.map(e => `
      <div class="posted-item">
        <a href="${e.tweet_url}" target="_blank">${e.author_handle}</a>
        <span class="posted-time">${new Date(e.posted_at).toLocaleString()}</span>
      </div>`).join('')}
  `;
}

// ── Actions ──
async function approve(id) {
  await api('PATCH', '/api/drafts/' + id, { status: 'approved' });
  const d = allDrafts.find(x => x.id === id);
  if (d) d.status = 'approved';
  save(); render();
}

function editDraft(id) {
  const d = allDrafts.find(x => x.id === id);
  if (!d) return;
  const el = document.getElementById('reply-' + id);
  el.innerHTML = `<textarea class="edit-area" id="ea-${id}" rows="3">${d.reply_text}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-approve btn-sm" onclick="saveEdit('${id}')">Save & approve</button>
      <button class="btn btn-ghost btn-sm" onclick="render()">Cancel</button>
    </div>`;
  document.getElementById('ea-' + id).focus();
}

async function saveEdit(id) {
  const text = document.getElementById('ea-' + id).value.trim();
  if (!text) return;
  await api('PATCH', '/api/drafts/' + id, { reply_text: text, status: 'approved' });
  const d = allDrafts.find(x => x.id === id);
  if (d) { d.reply_text = text; d.status = 'approved'; }
  render();
}

async function skip(id) {
  await api('PATCH', '/api/drafts/' + id, { status: 'skipped' });
  allDrafts = allDrafts.filter(x => x.id !== id);
  save(); toast('Skipped');
  render();
}

async function postAll() {
  const approved = allDrafts.filter(d => d.status === 'approved');
  if (!approved.length) return;

  const browserSid = sid || await ensureBrowser(() => {});
  if (!browserSid) return toast('Browser needed to post');

  const btn = $('post-all');
  if (btn) btn.disabled = true;

  for (let i = 0; i < approved.length; i++) {
    if (btn) btn.textContent = 'Posting ' + (i + 1) + '/' + approved.length + '...';
    await api('POST', '/api/drafts/' + approved[i].id + '/post', { browser_session_id: browserSid });
    approved[i].status = 'posted';
    if (i < approved.length - 1) await new Promise(r => setTimeout(r, 60000));
  }

  allDrafts = allDrafts.filter(d => d.status !== 'posted');
  toast('Posted ' + approved.length + ' replies!');
  render();
}

init();
</script>
</body>
</html>
